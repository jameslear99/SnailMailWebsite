# Snail Mail Social — Firebase App Hosting
# See https://firebase.google.com/docs/app-hosting/configure
#
# App Hosting auto-injects FIREBASE_WEBAPP_CONFIG (build) and FIREBASE_CONFIG
# (build + runtime) when the backend is linked to a Firebase web app — no
# NEXT_PUBLIC_* secrets required.
#
# Optional server secrets (Stripe, custom service account): create with
#   firebase apphosting:secrets:set SECRET_NAME --project YOUR_PROJECT
# then add env entries here and grant access:
#   firebase apphosting:secrets:grantaccess SECRET_NAME --backend BACKEND_ID

runConfig:
  minInstances: 0
  # maxInstances: 100
  # concurrency: 80
  # cpu: 1
  # memoryMiB: 512
